<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 作品集 | 全景展示</title>
    <!-- 引入 Pannellum CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        #panorama {
            width: 100%;
            height: 600px;
            border-radius: 8px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>项目全景预览</h1>
    <p>数字孪生 - 交通枢纽核心区 (静态渲染图展示)</p>
    
    <!-- 全景图容器 -->
    <div id="panorama"></div>
</div>

<!-- 引入 Pannellum JS -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
pannellum.viewer('panorama', {
    "type": "equirectangular",
    "panorama": "https://yourname.github.io/assets/panorama_8k.jpg", // 替换为你全景图的路径
    "autoLoad": true,
    "title": "交通枢纽数字孪生",
    "author": "你的名字"
});
</script>

</body>
</html>
